<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cars Character Swiper</title>
  <link rel="icon" href="public/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
  <!-- Swiper web-component bundle. Download locally for offline use:
       https://cdn.jsdelivr.net/npm/swiper@12.1.4/swiper-element-bundle.min.js -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@12.1.4/swiper-element-bundle.min.js"></script>
</head>
<body>
  <div id="app">

    <!-- ── Swiper View ────────────────────────────────────────── -->
    <div id="swiper-view" class="view active">
      <button id="btn-quiz"     class="fab-button fab-top-left"   aria-label="Quiz mode">❓</button>
      <button id="btn-browse"   class="fab-button fab-top-right2" aria-label="Browse characters">📋</button>
      <button id="btn-settings" class="fab-button fab-top-right"  aria-label="Settings">⚙</button>

      <div id="swiper-wrapper-div" class="swiper-wrapper-div">
        <swiper-container id="character-swiper" init="false" style="width:100%;height:100%">
        </swiper-container>
      </div>
      <div id="empty-state" class="empty-state" hidden style="display:none">No characters found for this filter.</div>

      <div class="controller-bar">
        <div class="timeline-track"><div id="timeline-fill" class="timeline-fill"></div></div>
        <button id="btn-to-start" class="controller-button" aria-label="Go to start">⏮</button>
        <button id="btn-prev"     class="controller-button" aria-label="Previous">‹</button>
        <button id="btn-play"     class="play-button"       aria-label="Play">⏵</button>
        <span   id="position-indicator" class="position-indicator">1 / 1</span>
        <button id="btn-next"     class="controller-button" aria-label="Next">›</button>
        <button id="btn-to-end"   class="controller-button" aria-label="Go to end">⏭</button>
        <div class="volume-control" id="volume-control">
          <button id="btn-volume" class="controller-button" aria-label="Volume">🔇</button>
          <div id="volume-popup" class="volume-popup" hidden>
            <div class="volume-popup-inner">
              <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0"
                     class="volume-slider-rotated" aria-label="Volume">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Quiz View ─────────────────────────────────────────── -->
    <div id="quiz-view" class="view" hidden>
      <div class="quiz-header">
        <button id="btn-quiz-back"     class="round-button" aria-label="Back to swiper">←</button>
        <span   id="quiz-title"        class="quiz-title">Who is this?</span>
        <button id="btn-quiz-settings" class="round-button" aria-label="Settings">⚙</button>
      </div>
      <div class="quiz-prompt">
        <img id="quiz-image" class="quiz-image" src="" alt="Guess this character">
        <button id="btn-quiz-replay" class="replay-button" aria-label="Play name">🔊</button>
      </div>
      <div id="quiz-grid" class="quiz-grid"></div>
      <div id="quiz-empty" class="quiz-empty" hidden>Not enough characters for a quiz. Need at least 4.</div>
    </div>

    <!-- ── Settings Panel ────────────────────────────────────── -->
    <div id="settings-overlay" class="panel-overlay" hidden></div>
    <div id="settings-panel" class="side-panel">
      <div class="panel-header">
        <h1 class="panel-title">Settings</h1>
        <button id="btn-settings-close" class="close-button" aria-label="Close settings">✕</button>
      </div>
      <div class="panel-content">
        <div class="settings-section">
          <label for="voice-select">Voice</label>
          <select id="voice-select">
            <option value="samantha">Samantha (Female)</option>
            <option value="daniel">Daniel (Male)</option>
            <option value="fred">Fred (Novelty)</option>
          </select>
        </div>
        <div class="settings-section">
          <label for="timeout-slider">Auto-Swipe Timeout: <span id="timeout-value">3</span>s</label>
          <input id="timeout-slider" type="range" min="1" max="10" step="0.5" value="3">
        </div>
        <div class="settings-section">
          <label for="sort-select">Sort Order</label>
          <select id="sort-select">
            <option value="alphabetical">Alphabetical</option>
            <option value="random">Random</option>
          </select>
        </div>
        <div class="settings-section">
          <label for="movie-select">Movie Filter</label>
          <select id="movie-select">
            <option value="all">All</option>
            <option value="cars1">Cars 1</option>
            <option value="cars2">Cars 2</option>
            <option value="cars3">Cars 3</option>
          </select>
        </div>
        <div class="settings-section">
          <label for="theme-select">Theme</label>
          <select id="theme-select">
            <option value="system">System Default</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ── Character Browser Panel ───────────────────────────── -->
    <div id="browser-overlay" class="panel-overlay" hidden></div>
    <div id="browser-panel" class="side-panel">
      <div class="panel-header">
        <h1 class="panel-title">Characters</h1>
        <button id="btn-browser-close" class="close-button" aria-label="Close character browser">✕</button>
      </div>
      <div class="browser-search-box">
        <input id="browser-search" type="text" placeholder="Search characters…" class="search-input">
      </div>
      <div id="browser-list" class="browser-list"></div>
    </div>

  </div><!-- #app -->

  <script src="js/characters.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/swiper-view.js"></script>
  <script src="js/settings-panel.js"></script>
  <script src="js/character-browser.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
